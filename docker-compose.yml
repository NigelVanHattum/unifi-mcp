services:
  unifi-mcp:
    image: ghcr.io/nigelvanHattum/unifi-mcp:latest
    build: .
    ports:
      - "8000:8000"
    restart: unless-stopped
    # Option A: config file (recommended — create from .env.example)
    env_file:
      - path: .env
        required: false
    volumes:
      - ${UNIFI_CONFIG_DIR:-~/.config/unifi-mcp}:/config:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
